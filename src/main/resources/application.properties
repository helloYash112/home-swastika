spring.application.name=PowerReading

# MySQL Connection Settings
spring.datasource.url=jdbc:mysql://localhost:3306/currentutilities
spring.datasource.username=root
spring.datasource.password=root

# Modern Driver Class (MySQL 8.0+)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Strategy: 'update' automatically updates the schema to match entities
spring.jpa.hibernate.ddl-auto=update

# SQL Logging: Useful for debugging (set to false in production)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hibernate Dialect (Spring Boot usually detects this automatically)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
hibernate.hikari.maximumPoolSize=10
server.port=8081